name: Build plugin

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "scripts/build_playlist_curator_plugin.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-plugin
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build archive
        run: python scripts/build_playlist_curator_plugin.py

      - name: Update download metadata
        env:
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          metadata_path = Path("plugins/PlaylistCurator/plugin.json")
          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
          release = metadata["versions"][0]
          archive = Path("dist/playlist_curator") / (
              f"playlist_curator_{release['version']}.zip"
          )
          release["sourceUrl"] = (
              "https://raw.githubusercontent.com/"
              f"{os.environ['REPOSITORY']}/{os.environ['BRANCH']}/{archive.as_posix()}"
          )
          release["checksum"] = hashlib.md5(
              archive.read_bytes(), usedforsecurity=False
          ).hexdigest()
          metadata_path.write_text(
              json.dumps(metadata, indent=2) + "\n",
              encoding="utf-8",
              newline="\n",
          )
          PY

      - name: Commit distribution files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist plugins/PlaylistCurator/plugin.json
          if git diff --cached --quiet; then
            echo "Distribution files are current."
          else
            git commit -m "Build plugin archive [skip ci]"
            git push
          fi
